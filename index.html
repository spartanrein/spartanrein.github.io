<!DOCTYPE html>
<html class="staticrypt-html">
    <head>
        <meta charset="utf-8" />
        <title>Hyrox Shanghai Ops - Login</title>
        <meta name="viewport" content="width=device-width, initial-scale=1" />

        <meta http-equiv="cache-control" content="max-age=0" />
        <meta http-equiv="cache-control" content="no-cache" />
        <meta http-equiv="expires" content="0" />
        <meta http-equiv="pragma" content="no-cache" />

        <style>
            :root {
                --bg-color: #000000;
                --card-bg: #111111;
                --text-color: #ffffff;
                --accent-color: #fceb00; /* Hyrox Neon Yellow */
                --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            }

            * { box-sizing: border-box; margin: 0; padding: 0; }

            .staticrypt-html, .staticrypt-body {
                height: 100%;
                background-color: var(--bg-color);
                font-family: var(--font-family);
                -webkit-font-smoothing: antialiased;
            }

            .staticrypt-content {
                display: flex;
                align-items: center;
                justify-content: center;
                height: 100%;
                padding: 20px;
            }

            .staticrypt-page {
                width: 100%;
                max-width: 400px;
            }

            .staticrypt-form-container {
                background: var(--card-bg);
                padding: 45px 35px;
                text-align: center;
                border-radius: 4px;
                border-top: 4px solid var(--accent-color);
                box-shadow: 0 20px 50px rgba(0, 0, 0, 0.7);
            }

            .staticrypt-title {
                font-size: 26px;
                font-weight: 900;
                color: var(--text-color);
                text-transform: uppercase;
                margin-bottom: 8px;
                letter-spacing: 1px;
            }

            .staticrypt-instructions p {
                color: #888;
                font-size: 13px;
                margin-bottom: 30px;
                text-transform: uppercase;
                letter-spacing: 1px;
            }

            .staticrypt-password-container {
                position: relative;
                margin-bottom: 20px;
            }

            .staticrypt-form-container input[type="password"],
            .staticrypt-form-container input[type="text"] {
                background: #222;
                border: 1px solid #333;
                border-radius: 4px;
                color: white;
                font-size: 16px;
                padding: 16px;
                width: 100%;
                outline: none;
                transition: border-color 0.2s;
            }

            .staticrypt-form-container input:focus {
                border-color: var(--accent-color);
            }

            .staticrypt-toggle-password-visibility {
                cursor: pointer;
                height: 22px;
                width: 22px;
                position: absolute;
                right: 15px;
                top: 50%;
                transform: translateY(-50%);
                filter: invert(1);
                opacity: 0.4;
                z-index: 10;
            }

            .staticrypt-toggle-password-visibility:hover {
                opacity: 0.8;
            }

            .staticrypt-decrypt-button {
                text-transform: uppercase;
                font-weight: 800;
                background: var(--accent-color);
                color: #000;
                width: 100%;
                border: none;
                padding: 18px;
                font-size: 15px;
                cursor: pointer;
                border-radius: 4px;
                transition: filter 0.2s, transform 0.1s;
                letter-spacing: 1px;
            }

            .staticrypt-decrypt-button:hover { filter: brightness(1.1); }
            .staticrypt-decrypt-button:active { transform: scale(0.98); }

            label.staticrypt-remember {
                display: flex;
                align-items: center;
                justify-content: center;
                margin-bottom: 25px;
                color: #666;
                font-size: 14px;
                cursor: pointer;
            }

            .staticrypt-remember input {
                width: auto;
                margin-right: 10px;
                accent-color: var(--accent-color);
            }

            .hidden { display: none !important; }
        </style>
    </head>
